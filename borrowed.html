<!DOCTYPE html>
<html>

<head>
<title>Borrowed Info</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
<div class="nav-left">
<a class="brand-link" href="dashboard.html">Library</a>
<a class="nav-shortcut" href="recently-added.html">Recently Added</a>
<a class="nav-shortcut" href="most-borrowed.html">Most Borrowed</a>
<a class="nav-shortcut" href="featured-books.html">Featured Books</a>
</div>
<div class="nav-right">
<div class="nav-search">
<input id="navSearchInput" placeholder="Search by book or genre">
<div id="navSearchResults" class="nav-search-results"></div>
</div>
<div class="profile-menu" id="profileMenu">
<button id="navUserBtn" class="nav-user-btn" type="button" onclick="toggleProfileMenu()"></button>
<div class="profile-dropdown" id="profileDropdown"></div>
</div>
</div>
</div>

<div class="page-container">
<h1>Borrowed Book Info</h1>
<p class="muted-text">Records for books borrowed by student accounts.</p>

<div class="table-wrap">
<table class="borrowed-table">
<thead>
<tr>
<th>Student Username</th>
<th>School ID</th>
<th>Book Title</th>
<th>Author</th>
<th>Credits</th>
<th>Issued Date</th>
</tr>
</thead>
<tbody id="borrowedTableBody"></tbody>
</table>
</div>

<h2 style="margin-top:28px">Credit Distribution</h2>
<div class="form-card">
<label>Select student</label>
<select id="creditStudent"></select>
<label>Action</label>
<select id="creditAction">
<option value="add">Add Credits</option>
<option value="remove">Remove Credits</option>
</select>
<label>Credits amount</label>
<input id="creditAmount" type="number" min="1" placeholder="Enter credits">
<button type="button" onclick="grantCredits()">Apply Credit Action</button>
</div>

<h3>Recent Credit History</h3>
<div class="table-wrap">
<table class="borrowed-table">
<thead>
<tr>
<th>Changed By</th>
<th>Action</th>
<th>Student</th>
<th>Amount</th>
<th>Resulting Credits</th>
<th>Date</th>
</tr>
</thead>
<tbody id="creditHistoryBody"></tbody>
</table>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
