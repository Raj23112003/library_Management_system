<!DOCTYPE html>
<html>

<head>
<title>Add Book</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
<div class="nav-left">
<a class="brand-link" href="dashboard.html">Library</a>
<a class="nav-shortcut" href="recently-added.html">Recently Added</a>
<a class="nav-shortcut" href="most-borrowed.html">Most Borrowed</a>
<a class="nav-shortcut" href="featured-books.html">Featured Books</a>
</div>
<div class="nav-right">
<div class="nav-search">
<input id="navSearchInput" placeholder="Search by book or genre">
<div id="navSearchResults" class="nav-search-results"></div>
</div>
<div class="profile-menu" id="profileMenu">
<button id="navUserBtn" class="nav-user-btn" type="button" onclick="toggleProfileMenu()"></button>
<div class="profile-dropdown" id="profileDropdown"></div>
</div>
</div>
</div>

<div class="page-container">
<h1>Add Custom Book</h1>

<div class="form-card">
<input id="bookName" placeholder="Book title">
<input id="author" placeholder="Author name">
<input id="genre" placeholder="Genre">
<input id="requiredCredits" type="number" min="1" value="1" placeholder="Required credits">
<input id="totalCopies" type="number" min="1" value="5" placeholder="Total copies">
<input id="cover" placeholder="Cover image URL (optional)">
<button type="button" onclick="addBook()">Add Book</button>
</div>

<h2>Added Books</h2>
<div id="customBookList" class="simple-list"></div>
</div>

<script src="script.js"></script>
</body>
</html>
